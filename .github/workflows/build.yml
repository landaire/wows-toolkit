on:
  release:
    types: [created]

permissions:
  id-token: write
  contents: write

jobs:
  release:
    name: Build and upload release
    runs-on: windows-latest
    environment: release-signing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc -p wows_toolkit

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign executable
        uses: azure/trusted-signing-action@v1
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: wows-toolkit
          certificate-profile-name: wows-toolkit
          files: ${{ github.workspace }}\target\x86_64-pc-windows-msvc\release\wows_toolkit.exe
          file-digest: SHA256

      - name: Create zip archive
        run: |
          Compress-Archive -Path "target/x86_64-pc-windows-msvc/release/wows_toolkit.exe","target/x86_64-pc-windows-msvc/release/wows_toolkit.pdb","README.md" -DestinationPath "wows_toolkit_${{ github.event.release.tag_name }}_windows.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wows_toolkit_${{ github.event.release.tag_name }}_windows.zip
            target/x86_64-pc-windows-msvc/release/wows_toolkit.pdb
