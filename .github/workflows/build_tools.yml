on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: x86_64-pc-windows-msvc

      - name: Install NASM
        # rav1e's `asm` feature (default in cpu-av1) requires nasm. Avoid JS actions.
        shell: pwsh
        run: ./scripts/install-nasm-windows.ps1

      - name: Build release binary
        run: |
          cargo build --release --target x86_64-pc-windows-msvc -p wowsunpack
          cargo build --release --target x86_64-pc-windows-msvc -p wows-data-mgr
          cargo build --release --target x86_64-pc-windows-msvc -p replayshark
          cargo build --release --target x86_64-pc-windows-msvc -p wows_minimap_renderer --features cpu
          Move-Item -Path ${{ github.workspace }}\target\x86_64-pc-windows-msvc\release\minimap_renderer.exe `
            -Destination ${{ github.workspace }}\target\x86_64-pc-windows-msvc\release\minimap_renderer_cpu.exe
          cargo build --release --target x86_64-pc-windows-msvc -p wows_minimap_renderer

      - name: Collect artifacts
        run: |
          New-Item -ItemType Directory -Path ${{ github.workspace }}\artifacts
          Move-Item -Path ${{ github.workspace }}\target\x86_64-pc-windows-msvc\release\*.exe `
          -Destination ${{ github.workspace }}\artifacts\

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: x86_64-unknown-linux-gnu

      - name: Install NASM
        # rav1e's `asm` feature (default in our cpu-av1 path) requires nasm.
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Build release binary
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu -p wowsunpack
          cargo build --release --target x86_64-unknown-linux-gnu -p wows-data-mgr
          cargo build --release --target x86_64-unknown-linux-gnu -p replayshark
          cargo build --release --target x86_64-unknown-linux-gnu -p wows_minimap_renderer --features cpu
          mv -f ./target/x86_64-unknown-linux-gnu/release/minimap_renderer \
          ./target/x86_64-unknown-linux-gnu/release/minimap_renderer_cpu
          cargo build --release --target x86_64-unknown-linux-gnu -p wows_minimap_renderer

      - name: Collect artifacts
        run: |
          mkdir ${{ github.workspace }}/artifacts
          mv ${{ github.workspace }}/target/x86_64-unknown-linux-gnu/release/wowsunpack ${{ github.workspace }}/artifacts/
          mv ${{ github.workspace }}/target/x86_64-unknown-linux-gnu/release/replayshark ${{ github.workspace }}/artifacts/
          mv ${{ github.workspace }}/target/x86_64-unknown-linux-gnu/release/wows-data-mgr ${{ github.workspace }}/artifacts/
          mv ${{ github.workspace }}/target/x86_64-unknown-linux-gnu/release/minimap_renderer_cpu ${{ github.workspace }}/artifacts/
          mv ${{ github.workspace }}/target/x86_64-unknown-linux-gnu/release/minimap_renderer ${{ github.workspace }}/artifacts/
          mv ${{ github.workspace }}/game_versions.toml ${{ github.workspace }}/artifacts/

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
