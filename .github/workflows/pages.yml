name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'crates/wt-web/**'
      - 'crates/wt-collab-egui/**'
      - 'crates/wt-collab-protocol/**'
      - 'crates/minimap-renderer/**'
      - '.github/workflows/pages.yml'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build wt-web WASM app
        run: nix develop --command trunk build --release --public-url /wows-toolkit/tactics/
        working-directory: crates/wt-web

      - name: Assemble deploy directory
        run: |
          mkdir -p _deploy/tactics
          cp -r site/* _deploy/
          cp -r crates/wt-web/dist/* _deploy/tactics/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
