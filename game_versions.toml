# Known World of Warships game versions.
#
# Maps build numbers to game versions and Steam depot manifest IDs.
# Build numbers are the directory names under bin/ in a WoWs installation.
# Manifest IDs can be found on SteamDB: https://steamdb.info/app/552993/depots/
#
# To download a specific version:
#   cargo run -p wows-data-mgr -- download --version 15.1
#
# To download the latest:
#   cargo run -p wows-data-mgr -- download --latest

