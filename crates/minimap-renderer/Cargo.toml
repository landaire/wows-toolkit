[package]
name = "wows_minimap_renderer"
version = "0.16.0"
publish = true
description = """
Library/CLI application for rendering World of Warships replay files as a minimap render
""""
repository = "https://github.com/landaire/wows-toolkit"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
name = "wows_minimap_renderer"

[[bin]]
name = "minimap_renderer"
path = "src/main.rs"
required-features = ["bin"]

[features]
default = ["bin", "gpu", "arc"]
bin = ["dep:clap", "dep:gettext", "dep:toml", "dep:indicatif"]
gpu = ["dep:vk-video", "dep:wgpu", "dep:yuvutils-rs"]
cpu = ["dep:openh264"]
arc = ["wows_replays/arc"]

[dependencies]
wows_replays = { workspace = true }
wowsunpack = { workspace = true, features = ["json", "vfs"] }
image = { workspace = true, features = ["png", "jpeg"] }
ab_glyph = "0.2"
mp4 = "0.14"
bytes = "1"
clap = { version = "2.33.1", optional = true }
toml = { version = "0.8", optional = true }
serde = { workspace = true }
convert_case = "0.6"
gettext = { workspace = true, optional = true }
roxmltree = { workspace = true }
resvg = "0.44"
tiny-skia = "0.11"
indicatif = { version = "0.18.4", optional = true }

# GPU encoder (default)
vk-video = { version = "0.2", optional = true }
wgpu = { version = "28", optional = true }
yuvutils-rs = { version = "0.8", optional = true }

# CPU encoder (non-default)
openh264 = { version = "0.9", features = ["source"], optional = true }
rootcause = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = "0.3.22"
