<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WoWs Toolkit - Tactics Board</title>
    <link data-trunk rel="rust" data-wasm-opt="2" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ccc;
            font-family: sans-serif;
            text-align: center;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,.2);
            border-top-color: #4ce8aa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <canvas id="the_canvas_id"></canvas>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Loading WoWs Toolkit...</div>
    </div>
    <script>
        // Hide loading spinner once WASM loads
        document.addEventListener('DOMContentLoaded', function() {
            // The canvas will be initialized by eframe; hide the loading screen
            // once the WASM module starts rendering.
            setTimeout(function() {
                var el = document.getElementById('loading');
                if (el) el.style.display = 'none';
            }, 2000);
        });
    </script>
</body>
</html>
